name: Build iOS IPA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: List Schemes
        run: xcodebuild -project PureVisioniOS.xcodeproj -list

      - name: Build Archive
        run: |
          set -o pipefail
          mkdir -p build
          xcodebuild archive \
            -project PureVisioniOS.xcodeproj \
            -scheme PureVisioniOS \
            -configuration Release \
            -archivePath $GITHUB_WORKSPACE/build/PureVisioniOS.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENABLE_BITCODE=NO \
            MARKETING_VERSION=1.0.0 \
            CURRENT_PROJECT_VERSION=${{ github.run_number }}

      - name: Create IPA from Archive
        run: |
          mkdir -p build/ipa
          cd build/PureVisioniOS.xcarchive/Products
          zip -r -q $GITHUB_WORKSPACE/build/ipa/PureVisioniOS.ipa Applications/
          echo "IPA created successfully"
          ls -lh $GITHUB_WORKSPACE/build/ipa/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: PureVisioniOS-v${{ github.run_number }}
          path: build/ipa/PureVisioniOS.ipa
          retention-days: 30
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Download IPA
        uses: actions/download-artifact@v4
        with:
          name: PureVisioniOS-v${{ github.run_number }}
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Pure Vision iOS v1.0.${{ github.run_number }}"
          body: |
            ## Pure Vision iOS
            Real-time face and body censoring for iPhone and iPad.
            ### Install
            1. Download `PureVisioniOS.ipa`
            2. Sideload via AltStore, Sideloadly, or TrollStore
          files: artifacts/PureVisioniOS.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
