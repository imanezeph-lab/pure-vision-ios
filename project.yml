name: PureVisioniOS
options:
  bundleIdPrefix: com.purevision
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    INFOPLIST_FILE: PureVisioniOS/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    PRODUCT_BUNDLE_IDENTIFIER: com.purevision.ios
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"

targets:
  PureVisioniOS:
    type: application
    platform: iOS
    sources:
      - path: PureVisioniOS
        excludes:
          - "**/*.xcassets"
    resources:
      - path: PureVisioniOS/Assets.xcassets
      - path: PureVisioniOS/Resources
    settings:
      base:
        INFOPLIST_FILE: PureVisioniOS/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.purevision.ios
        CODE_SIGN_ENTITLEMENTS: PureVisioniOS/PureVisioniOS.entitlements
    entitlements:
      path: PureVisioniOS/PureVisioniOS.entitlements
